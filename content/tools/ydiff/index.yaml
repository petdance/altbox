body: |
    `ydiff` is a terminal-based tool to view colored, incremental diffs in
    a version-controlled workspace or from stdin, in side-by-side (similar
    to diff -y) or unified mode, and auto-paged. It only requires Python >=
    3.3 without external dependencies and `less` as a pager.

    {{screenshot: darkbg-side-by-side-default.png, ydiff in action}}
