body: |
    `duf` is a modern alternative to `df` with user-friendly, colorful output.
    It works on Linux, BSD, macOS, and Windows.

    - User-friendly, colorful output
    - Adapts to your terminal's theme and width
    - Sortable results
    - Device grouping and filtering
    - JSON output support

