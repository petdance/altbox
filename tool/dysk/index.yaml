body: |
  dysk is an alternative to df that shows filesystem/disk information in a more readable, customizable format.

  Key features:

  - Customizable columns
  - Filtering and sorting
  - Multiple output formats: table, JSON, CSV
  - Usable as a library via the lfs-core Rust crate

