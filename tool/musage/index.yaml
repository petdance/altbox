body: |
    musage is a Rust-based `free` replacement that visualizes RAM and cache usage in a
    single bargraph, using background and foreground colors to distinguish the two.

    ## Features

    - Visual bargraph with cache usage in the background and RAM usage in the foreground
    - At-a-glance memory overview without parsing raw numbers

    {{screenshot: screenshot.png, musage showing RAM and cache usage as a bargraph}}

    ## Availability

    Available on Linux.
