body: |
    `duu` recursively displays disk usage in kilobytes of the given directory.

    ## Sample output

    ```
    c:\>duu compinfo

    242 compinfo
    0   compinfo\bin
    0   compinfo\bin\Debug
    485 compinfo\bin\Release
    0   compinfo\obj
    46  compinfo\obj\Debug
    0   compinfo\obj\Debug\TempPE
    735 compinfo\obj\Release
    4   compinfo\obj\Release\TempPE
    17  compinfo\Properties

    summary
    =======
    files         : 59
    directories   : 10
    bytes         : 1,566,218
    kilobytes     : 1,529.51
    megabytes     : 1.49
    ```
