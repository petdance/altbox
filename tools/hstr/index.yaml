body: |
    HSTR (HiSToRy) is a command line utility that brings improved bash/zsh command completion from the history. It aims
    to make completion easier and more efficient than Ctrl-r.

    HSTR can also manage your command history (for instance you can remove commands that are obsolete or contain a piece
    of sensitive information) or bookmark your favorite commands.

