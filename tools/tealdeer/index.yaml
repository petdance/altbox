body: |
    tealdeer is a fast, standalone implementation of [tldr](/tool/tldr) written in Rust. It downloads and caches tldr
    pages locally, allowing you to access simplified, example-based command documentation offline. Once you've
    downloaded the pages for the first time, tealdeer will serve them quickly without requiring an internet connection.

    The tool is fully compatible with the `tldr` command-line interface while offering additional features like advanced
    syntax highlighting, configuration options, and exceptional execution speed. With typical query times around 13ms,
    tealdeer is among the fastest tldr clients available, making it ideal for frequent lookups.

    {{screenshot: screenshot.png, tealdeer displaying a simplified command example}}

    ## Basic usage

    ```bash
    # View a tealdeer page for a command.
    tldr tar

    # Update the cached pages.
    tldr --update

    # Search for pages by keyword.
    tldr -s extract
    ```
