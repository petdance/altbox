body: |
    trippy is a terminal-based network diagnostic utility that merges the functionality
    of traceroute and ping. It provides real-time visualization of network paths while
    simultaneously gathering latency statistics, making it ideal for analyzing networking
    issues and routing problems in a single tool.

    ## Features

    - Combined diagnostics: Traceroute and ping functionality in one tool
    - Real-time visualization: Display network hops and latency metrics interactively
    - Latency measurement: Gather comprehensive ping statistics for each hop
    - Cross-platform support: Works on Linux, BSD, macOS, and Windows
    - Terminal UI: Intuitive interface built with Ratatui framework
    - Customizable themes: Multiple visual themes for different preferences
    - Configurable analysis: Adjust parameters for specific network diagnostics
    - Extensive documentation: Comprehensive guides and examples

