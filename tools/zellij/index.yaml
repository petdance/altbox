body: |
    Zellij is a terminal workspace designed for developers who want the power of a terminal multiplexer with an emphasis
    on ease of use. It provides a modern alternative to [tmux](/tool/tmux) and [screen](/alternative-to/screen/) with
    built-in features and a user-friendly approach.

    ## Features

    - Customizable layouts with floating and stacked panes
    - Multiplayer mode for collaborative terminal sessions
    - WebAssembly-based plugin system for extensibility
    - Built-in web client for remote access
    - User-friendly UI with sensible defaults
    - Automatic layout arrangement and pane management

    {{screenshot: screenshot.png, Zellij terminal workspace with multiple panes}}
