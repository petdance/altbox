body: |
    Termscp is a terminal-based file transfer application that combines the functionality of a file
    manager with remote connection capabilities. It provides an interactive interface for managing
    files locally and on remote servers across multiple platforms.

    ## Features

    - Protocol support for SFTP, SCP, FTP, FTPS, Kubernetes, S3, SMB, and WebDAV
    - Create, remove, rename, search, view, and edit files on local and remote systems
    - SSH key and password-based authentication for SFTP/SCP
    - Themeable interface with customizable file explorer format
    - Customizable text editor integration
    - Desktop notifications for large file transfers
    - Built-in bookmarks for quick access to frequent locations
    - Password vault integration for secure credential storage
    - Embedded terminal access within the interface
    - File synchronization monitoring capabilities
    - Cross-platform support (Linux, macOS, FreeBSD, NetBSD, Windows)

