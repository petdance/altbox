body: |
    eza is a modern alternative for the venerable file-listing command-line
    program ls that ships with Unix and Linux operating systems, giving it
    more features and better defaults. It uses colours to distinguish file
    types and metadata. It knows about symlinks, extended attributes, and
    Git. And it’s small, fast, and just one single binary.

    {{screenshot: screenshots.png, eza in action}}

    Features include
    - Filtering options
    - Customizable output
    - Hyperlink support
    - Mount point details
    - Selinux context output
    - Git repo status output
    - Human readable relative dates
    - Support for bright terminal colours
    - Configuration theme.yml file for customization of colors and icons

    eza is a maintained version of [exa](/tool/exa), which has been abandoned.
